name: Publish to ClawHub

# Publishes @infino-ai/memory-infino to ClawHub (clawhub.ai), OpenClaw's plugin
# registry. This is separate from the npm publish (publish.yml).
#
# Why publish the local folder (not the GitHub ref): dist/ is gitignored, so the
# ref has no built runtime and a ref-publish fails ("./dist/index.js missing").
# We build here, then `clawhub package publish .` packs the folder (with the
# built dist/) and auto-detects source attribution from the git origin remote,
# so the release stays "source-linked".
#
# Auth: the CLAWHUB_TOKEN repo secret (generate once locally — `clawhub login`
# then `clawhub token`). The package has a ClawHub trusted publisher configured,
# which flags every non-OIDC publish as "manual" and requires an explicit
# reason — so the publish passes `--manual-override-reason`. (The CLI does not
# yet perform GitHub OIDC exchange, so secretless publishing isn't available;
# token + override is the working path.)
#
# Triggered manually. The default run is a dry run (resolves the publish, uploads
# nothing). Re-run with dry_run unchecked to publish for real.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — resolve the publish, upload nothing"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to ClawHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # the clawhub CLI requires Node >= 22
      - name: Install dependencies
        run: npm ci
      # Build dist/ (gitignored) and run the oracle + auto tests as a gate.
      - name: Build and test
        run: npm test
      - name: Authenticate to ClawHub
        run: npx -y clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      # Publish the local folder: packs the built dist/, auto-attributes source
      # from the checkout's GitHub origin remote (source-linked). A trusted
      # publisher is configured, so a token publish needs an override reason.
      - name: Publish to ClawHub
        run: |
          npx -y clawhub package publish . --owner infino-ai \
            --manual-override-reason "CI publish via clawhub-publish.yml (token auth; OIDC unsupported by CLI)" \
            ${{ inputs.dry_run && '--dry-run' || '' }}

# --- Trusted publisher config (currently set) ---
# A trusted publisher is configured for this package (provider github-actions,
# repo infino-ai/memory-infino, workflow clawhub-publish.yml):
#
#   clawhub package trusted-publisher set @infino-ai/memory-infino \
#     --repository infino-ai/memory-infino \
#     --workflow-filename clawhub-publish.yml
#
# The intent is secretless OIDC publishing, but the clawhub CLI (v0.23.0) does
# not yet perform the GitHub OIDC exchange — a run with `id-token: write` and no
# token fails "Not logged in". Until the CLI supports it, we publish with the
# CLAWHUB_TOKEN secret plus `--manual-override-reason` (above). Once the CLI can
# do OIDC, drop the login + override and add `permissions: id-token: write`.
# To remove the requirement entirely instead:
#   clawhub package trusted-publisher delete @infino-ai/memory-infino
