name: Publish to npm

# Publishes @infino-ai/memory-infino (the OpenClaw memory plugin) to the public
# npm registry.
#
# Auth is the classic NPM_TOKEN secret (publish rights to packages under the
# infino-ai org). Provenance — the "built from this repo at this commit"
# attestation on npmjs.org — is emitted via NPM_CONFIG_PROVENANCE + the OIDC
# id-token; this requires the GitHub source repository to be public.
#
# Triggered manually. The default run is a dry run: it builds, tests, and packs
# without uploading. Re-run with dry_run unchecked to publish for real.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — build + test + pack, publish nothing"
        type: boolean
        default: true

permissions:
  id-token: write # OIDC token for npm provenance
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # npm ci installs exactly what package-lock.json pins, from public npm.
      - name: Install dependencies
        run: npm ci
      # Builds dist/ and runs the oracle tests against the real infino binding.
      - name: Build and test
        run: npm test
      - name: Validate (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --tag latest --access public
      # Idempotent: skip if this version is already on npm, so a re-run doesn't
      # fail on "cannot publish over existing version".
      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@infino-ai/memory-infino@$VERSION" version >/dev/null 2>&1; then
            echo "@infino-ai/memory-infino@$VERSION is already on npm — skipping."
          else
            npm publish --tag latest --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
