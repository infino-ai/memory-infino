name: Publish (Gemfury early access)

# Interim early-access publish: builds and uploads the @infino-ai/memory-infino
# OpenClaw memory plugin to the Gemfury account `infino`, instead of the public
# npm registry. For internal team use for now.
#
# Teammates install via Gemfury's smart proxy (blends the Gemfury repo with the
# public npm index, so public deps — and the `infino` binding — resolve). For a
# PUBLIC Gemfury package no token is needed:
#
#   npm i @infino-ai/memory-infino --registry https://npm-proxy.fury.io/infino/
#
# In OpenClaw, install the plugin against the same proxy (see README).
#
# The public-launch path is plain `npm publish` to npmjs.org; at launch we
# publish there and teammates drop the --registry flag (and the repo's .npmrc).
#
# Triggered manually. Default run is a dry run (build + pack, upload nothing).
# A real run needs the secret FURY_PUSH_TOKEN (a Gemfury push token for the
# `infino` account).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — build + pack, upload nothing"
        type: boolean
        default: true

jobs:
  publish:
    name: Build, pack, upload to Gemfury
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # The committed .npmrc points npm at the Gemfury smart proxy, so the
      # `infino` dependency resolves from there (public deps fall through to
      # the npm index). npm ci installs exactly what package-lock.json pins.
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      # `npm pack` honours package.json "files" (dist/ + openclaw.plugin.json)
      # and always adds package.json + README + LICENSE. Pack into a side dir so
      # it never collides with dist/ (the tsc output).
      - name: Pack tarball
        run: |
          mkdir -p pack
          npm pack --pack-destination pack
          echo "Packed:" && ls -1 pack
      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: pack/*.tgz
          if-no-files-found: error
      # Gemfury takes a ready tarball via its push endpoint (not `npm publish`):
      #   curl -F package=@<file> https://<token>@push.fury.io/infino/
      - name: Upload to Gemfury
        if: ${{ !inputs.dry_run }}
        env:
          FURY_PUSH_TOKEN: ${{ secrets.FURY_PUSH_TOKEN }}
        run: |
          if [ -z "${FURY_PUSH_TOKEN}" ]; then
            echo "FURY_PUSH_TOKEN is not set — add it as a repository secret." >&2
            exit 1
          fi
          for f in pack/*.tgz; do
            echo "Uploading $f"
            curl -fsS -F package=@"$f" "https://${FURY_PUSH_TOKEN}@push.fury.io/infino/"
            echo
          done
